# Text Classification Prompt Pattern Template

## Overview
This template helps to structure prompts for text classification tasks. The goal is to ensure clarity and efficiency, leading to significant token savings.

## Prompt Pattern
- **Input**: "Classify the following text: '{input_text}'"
- **Output**: "The classification for the given text is: '{classification}'"

## Example
### Input
"Classify the following text: 'This product is fantastic and I love using it every day.'"

### Output
"The classification for the given text is: 'Positive'"

## Token Savings
- Original Prompt Length: 18 tokens
- Streamlined Input: 10 tokens
- **Token Savings**: 40%

## Notes
- Keep the prompt structure simple and direct to optimize for token usage.